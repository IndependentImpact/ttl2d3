<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Ontology</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f9fa;
      color: #212529;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

     
    #toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: #ffffff;
      border-bottom: 1px solid #dee2e6;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 30rem;
    }

    #search {
      flex: 1;
      max-width: 20rem;
      padding: 0.25rem 0.5rem;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 0.875rem;
      color: #212529;
      background: #ffffff;
    }

    #search:focus {
      outline: 2px solid #0d6efd;
      outline-offset: 1px;
    }

     
    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #graph {
      width: 100%;
      height: 100%;
      display: block;
    }

     
    .link {
      fill: none;
      stroke: #868e96;
      stroke-opacity: 0.6;
      stroke-width: 1.5px;
    }

    .link.faded { stroke-opacity: 0.08; }

     
    .node { cursor: pointer; }

    .node path {
      stroke-width: 1.5px;
      transition: stroke-width 0.1s;
    }

    .node.faded path   { opacity: 0.15; }
    .node.faded .node-label { opacity: 0.15; }

    .node.highlighted path { stroke-width: 3px; }

    .node-label {
      font-size: 11px;
      fill: #343a40;
      pointer-events: none;
      text-anchor: middle;
    }

     
    .link-label {
      font-size: 10px;
      fill: #636c72;
      pointer-events: none;
      text-anchor: middle;
    }

    .link-label.faded { opacity: 0.08; }

     
    #legend {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      line-height: 1.5;
    }

    #legend h2 {
      font-size: 0.8125rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #212529;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legend-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .legend-swatch.circle  { border-radius: 50%; }
    .legend-swatch.diamond { transform: rotate(45deg); width: 12px; height: 12px; }
    .legend-swatch.triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

     
    #tooltip {
      position: fixed;
      background: rgba(33, 37, 41, 0.92);
      color: #f8f9fa;
      padding: 0.375rem 0.625rem;
      border-radius: 4px;
      font-size: 0.8125rem;
      line-height: 1.5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      max-width: 24rem;
      word-break: break-all;
      z-index: 100;
    }

    #tooltip.visible { opacity: 1; }

    #tooltip dt { font-weight: 700; display: inline; }
    #tooltip dt::after { content: ": "; }
    #tooltip dd { display: inline; margin: 0; }
    #tooltip p  { margin: 0; }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>Test Ontology</h1>
    <input
      id="search"
      type="search"
      placeholder="Search nodes…"
      aria-label="Search nodes by label"
    />
  </div>

  <div id="graph-container">
    <svg
      id="graph"
      role="img"
      aria-label="Force-directed ontology graph"
    ></svg>

    <nav id="legend" aria-label="Graph legend">
      <h2>Legend</h2>
      <div class="legend-item">
        <span class="legend-swatch circle" style="background:#1f77b4;" aria-hidden="true"></span>
        <span>Class</span>
      </div>
      <div class="legend-item">
        <span class="legend-swatch triangle" style="background:#0c8599;" aria-hidden="true"></span>
        <span>Union</span>
      </div>
      <div class="legend-item">
        <span class="legend-swatch diamond" style="background:#9e5200;" aria-hidden="true"></span>
        <span>Property</span>
      </div>
      <div class="legend-item">
        <span class="legend-swatch" style="background:#2ca02c;" aria-hidden="true"></span>
        <span>Instance</span>
      </div>
      <div class="legend-item">
        <span class="legend-swatch" style="background:#d62728;" aria-hidden="true"></span>
        <span>Literal</span>
      </div>
    </nav>
  </div>

  <div id="tooltip" role="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
  (function () {
    'use strict';

     
    const graphData = {
  "nodes": [
    {
      "id": "https://example.org/A",
      "label": "A",
      "type": "class",
      "group": "example"
    },
    {
      "id": "https://example.org/B",
      "label": "B",
      "type": "class",
      "group": "example"
    }
  ],
  "links": [
    {
      "source": "https://example.org/A",
      "target": "https://example.org/B",
      "label": "subClassOf"
    }
  ],
  "metadata": {
    "title": "Test Ontology",
    "version": "1.0",
    "baseIRI": "https://example.org/"
  }
}
;

     
    const CFG = {
      linkDistance:    80 ,
      chargeStrength:  -300 ,
      collideRadius:   20 ,
    };

     
    const TYPE_COLOR = {
      class:    '#1f77b4',
      property: '#9e5200',
      union:    '#0c8599',
      instance: '#2ca02c',
      literal:  '#d62728',
    };

    const TYPE_SYMBOL = {
      class:    d3.symbolCircle,
      property: d3.symbolDiamond,
      union:    d3.symbolTriangle,
      instance: d3.symbolSquare,
      literal:  d3.symbolSquare,
    };

    const NODE_SIZE = 120; 

     
    const graphContainer = document.getElementById('graph-container');
    const svg = d3.select('#graph');

    function getDims() {
      const r = graphContainer.getBoundingClientRect();
      return { width: r.width || 800, height: r.height || 600 };
    }

    let { width, height } = getDims();

    const root = svg.append('g').attr('class', 'root');

    const zoom = d3.zoom()
      .scaleExtent([0.05, 20])
      .on('zoom', (event) => root.attr('transform', event.transform));

    svg.call(zoom).on('dblclick.zoom', null);

     
    svg.append('defs').append('marker')
      .attr('id', 'arrowhead')
      .attr('viewBox', '0 -4 10 8')
      .attr('refX', 16)
      .attr('refY', 0)
      .attr('markerWidth', 8)
      .attr('markerHeight', 8)
      .attr('orient', 'auto')
      .append('path')
        .attr('d', 'M0,-4L10,0L0,4')
        .attr('fill', '#868e96');

     
    const nodes = (graphData.nodes || []).map((d) => Object.assign({}, d));
    const links = (graphData.links || []).map((d) => Object.assign({}, d));

     
    
    
    (function () {
      
      
      const CURVE_STEP = 40; 
      
      
      const SEP = '\x00';
      const counts  = Object.create(null);
      const idxCtrs = Object.create(null);

      links.forEach((d) => {
        const k = d.source + SEP + d.target;
        counts[k] = (counts[k] || 0) + 1;
      });

      links.forEach((d) => {
        const k = d.source + SEP + d.target;
        if (idxCtrs[k] === undefined) idxCtrs[k] = 0;
        const n = counts[k];
        const i = idxCtrs[k]++;
        
        d._curvature = (i - (n - 1) / 2) * CURVE_STEP;
        d._loopIdx   = i; 
      });
    }());

     
    const linkGroup = root.append('g').attr('class', 'links');
    const nodeGroup = root.append('g').attr('class', 'nodes');

    const linkSel = linkGroup.selectAll('.link')
      .data(links)
      .join('path')
        .attr('class', 'link')
        .attr('marker-end', 'url(#arrowhead)');

    const linkLabelSel = linkGroup.selectAll('.link-label')
      .data(links.filter((d) => d.label))
      .join('text')
        .attr('class', 'link-label')
        .text((d) => d.label);

     
    const symbolGen = d3.symbol().size(NODE_SIZE);

    const nodeSel = nodeGroup.selectAll('.node')
      .data(nodes)
      .join('g')
        .attr('class', 'node')
        .attr('aria-label', (d) => `${d.label || d.id} (${d.type})`)
        .call(
          d3.drag()
            .on('start', dragStarted)
            .on('drag',  dragged)
            .on('end',   dragEnded)
        );

    nodeSel.append('path')
      .attr('d', (d) => symbolGen.type(TYPE_SYMBOL[d.type] || d3.symbolCircle)())
      .attr('fill',   (d) => TYPE_COLOR[d.type] || '#999999')
      .attr('stroke', (d) => d3.color(TYPE_COLOR[d.type] || '#999999').darker(0.6));

    nodeSel.append('text')
      .attr('class', 'node-label')
      .attr('dy', 14)
      .text((d) => d.label || d.id);

     
    const simulation = d3.forceSimulation(nodes)
      .force('link',    d3.forceLink(links).id((d) => d.id).distance(CFG.linkDistance))
      .force('charge',  d3.forceManyBody().strength(CFG.chargeStrength))
      .force('center',  d3.forceCenter(width / 2, height / 2))
      .force('collide', d3.forceCollide(CFG.collideRadius))
      .on('tick', ticked);

     

    
    
    
    
    
    
    
    const LOOP_BASE_RADIUS      = 24; 
    const LOOP_RADIUS_INCREMENT = 16; 

    function linkPath(d) {
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;

      if (d.source === d.target) {
        
        const r = LOOP_BASE_RADIUS + d._loopIdx * LOOP_RADIUS_INCREMENT;
        return `M ${sx},${sy} C ${sx + r},${sy - r} ${sx + r * 2},${sy} ${sx},${sy}`;
      }

      if (d._curvature === 0) {
        return `M ${sx},${sy} L ${tx},${ty}`;
      }

      
      const dx = tx - sx, dy = ty - sy;
      const len = Math.hypot(dx, dy) || 1;
      const cpx = (sx + tx) / 2 - (dy / len) * d._curvature;
      const cpy = (sy + ty) / 2 + (dx / len) * d._curvature;
      return `M ${sx},${sy} Q ${cpx},${cpy} ${tx},${ty}`;
    }

    
    
    function linkMidpoint(d) {
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;

      if (d.source === d.target) {
        const r = LOOP_BASE_RADIUS + d._loopIdx * LOOP_RADIUS_INCREMENT;
        return { x: sx + r, y: sy - r };
      }

      if (d._curvature === 0) {
        return { x: (sx + tx) / 2, y: (sy + ty) / 2 };
      }

      const dx = tx - sx, dy = ty - sy;
      const len = Math.hypot(dx, dy) || 1;
      const cpx = (sx + tx) / 2 - (dy / len) * d._curvature;
      const cpy = (sy + ty) / 2 + (dx / len) * d._curvature;
      
      return { x: (sx + 2 * cpx + tx) / 4, y: (sy + 2 * cpy + ty) / 4 };
    }

    function ticked() {
      linkSel.attr('d', linkPath);

      linkLabelSel
        .attr('x', (d) => linkMidpoint(d).x)
        .attr('y', (d) => linkMidpoint(d).y);

      nodeSel.attr('transform', (d) => `translate(${d.x},${d.y})`);
    }

     
    function dragStarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

     
    const tooltipEl = document.getElementById('tooltip');

    nodeSel
      .on('mouseover', (event, d) => {
        tooltipEl.innerHTML =
          '<p><dt>Label</dt><dd>' + escHtml(d.label || '') + '</dd></p>' +
          '<p><dt>Type</dt><dd>'  + escHtml(d.type  || '') + '</dd></p>' +
          '<p><dt>IRI</dt><dd>'   + escHtml(d.id    || '') + '</dd></p>' +
          (d.group ? '<p><dt>Group</dt><dd>' + escHtml(d.group) + '</dd></p>' : '');
        tooltipEl.classList.add('visible');
        moveTooltip(event);
      })
      .on('mousemove', moveTooltip)
      .on('mouseleave', () => tooltipEl.classList.remove('visible'));

    function moveTooltip(event) {
      tooltipEl.style.left = (event.clientX + 14) + 'px';
      tooltipEl.style.top  = (event.clientY + 14) + 'px';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

     
    document.getElementById('search').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();

      if (!q) {
        nodeSel.classed('faded', false).classed('highlighted', false);
        linkSel.classed('faded', false);
        linkLabelSel.classed('faded', false);
        return;
      }

      const matchedIDs = new Set(
        nodes
          .filter((d) => (d.label || d.id).toLowerCase().includes(q))
          .map((d) => d.id)
      );

      nodeSel
        .classed('highlighted', (d) => matchedIDs.has(d.id))
        .classed('faded', (d) => !matchedIDs.has(d.id));

      linkSel.classed('faded', (d) => {
        const sid = typeof d.source === 'object' ? d.source.id : d.source;
        const tid = typeof d.target === 'object' ? d.target.id : d.target;
        return !matchedIDs.has(sid) && !matchedIDs.has(tid);
      });

      linkLabelSel.classed('faded', (d) => {
        const sid = typeof d.source === 'object' ? d.source.id : d.source;
        const tid = typeof d.target === 'object' ? d.target.id : d.target;
        return !matchedIDs.has(sid) && !matchedIDs.has(tid);
      });
    });

     
    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(function () {
        const dims = getDims();
        width  = dims.width;
        height = dims.height;
        simulation.force('center', d3.forceCenter(width / 2, height / 2));
        simulation.alpha(0.3).restart();
      }).observe(graphContainer);
    }

  }());
  </script>
</body>
</html>
